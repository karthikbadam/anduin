server {
    listen       80;
    server_name  _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types application/javascript application/json text/css text/plain image/svg+xml;
    gzip_min_length 1024;

    # env.js is emitted by the entrypoint at container start and should never be cached.
    location = /env.js {
        add_header Cache-Control "no-store" always;
        try_files /env.js =404;
    }

    # SPA fallback — all unknown routes serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets can be cached aggressively (they're hash-named).
    location ~* \.(js|css|woff2?|png|jpe?g|svg|gif|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }
}
